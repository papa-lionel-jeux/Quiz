<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<meta name="description" content="Quiz de culture générale multijoueur — Histoire, Cinéma, Musique, Sciences et plus !">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --surface: #14141e;
    --surface2: #1c1c2a;
    --border: rgba(255,255,255,0.10);
    --accent: #e8c547;
    --accent2: #f07c3e;
    --text: #f0ede6;
    --muted: #8a8aa0;
    --green: #4eca7f;
    --red: #e85454;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    overflow-x: hidden;
  }

  /* ── BACKGROUND DECOR ── */
  .bg-decor {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-decor::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 90% 55% at 50% -5%,  rgba(232,197,71,0.28) 0%, transparent 65%),
      radial-gradient(ellipse 70% 50% at 10% 110%,  rgba(120,80,200,0.22) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%,  rgba(240,124,62,0.18) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 0%   50%,  rgba(78,202,127,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 100% 50%,  rgba(74,144,226,0.10) 0%, transparent 60%);
  }
  /* pas de quadrillage */

  .bg-icon {
    position: absolute;
    user-select: none;
    line-height: 1;
    animation: floatIcon 13s ease-in-out infinite;
  }

  @keyframes floatIcon {
    0%,100% { transform: translateY(0px) rotate(0deg) scale(1); }
    25%      { transform: translateY(-18px) rotate(5deg) scale(1.05); }
    60%      { transform: translateY(10px) rotate(-3deg) scale(0.97); }
    80%      { transform: translateY(-12px) rotate(2deg) scale(1.02); }
  }
  @keyframes floatIconAlt {
    0%,100% { transform: translateY(0px) rotate(0deg); }
    40%      { transform: translateY(16px) rotate(-6deg); }
    70%      { transform: translateY(-10px) rotate(4deg); }
  }
  @keyframes pulseGlow {
    0%,100% { filter: drop-shadow(0 0 8px currentColor); }
    50%      { filter: drop-shadow(0 0 28px currentColor) brightness(1.3); }
  }

  #app { width: 100%; max-width: 860px; position: relative; z-index: 1; }

  /* SCREENS */
  .screen { }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .hidden { display: none !important; }

  /* LOGO */
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 10vw, 80px); letter-spacing: 4px; text-align: center; line-height: 1; }
  .logo span { color: var(--accent); }
  .tagline { text-align: center; color: var(--muted); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; margin-bottom: 2.5rem; }

  /* ═══════════════════════════════════════════
     RESPONSIVE — mobile / tablette / desktop
     breakpoints : 360 | 480 | 640 | 860
  ═══════════════════════════════════════════ */

  /* SETUP GRID : 3 par ligne */
  .setup-grid { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .setup-grid .player-slot { 
    flex: 1 1 calc(33.333% - 4px); 
    min-width: 0;
    padding: clamp(5px, 2vw, 8px);
  }

  /* PLAYER COUNT SELECT */
  .player-count-wrapper {
    position: relative;
  }
  .player-count-wrapper::after {
    content: '▾'; position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%); color: var(--muted);
    pointer-events: none; font-size: 14px;
  }
  .player-count-select {
    width: 100%; padding: 8px 24px 8px 12px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; appearance: none; -webkit-appearance: none; outline: none;
  }
  .player-count-select:focus, .player-count-select:hover { border-color: var(--accent); }

  /* DIFF ROW */
  .diff-row { display: flex; gap: 6px; margin-bottom: 2rem; flex-wrap: wrap; }
  .diff-btn {
    flex: 1 1 0; min-width: 0; padding: 5px 6px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--muted); font-size: clamp(10px, 2.2vw, 12px); font-weight: 500;
    cursor: pointer; text-align: center; transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px; overflow: hidden; line-height: 1.2;
  }
  .diff-btn .btn-row { display: flex; align-items: center; gap: 4px; justify-content: center; max-width: 100%; overflow: hidden; }
  .diff-btn .btn-row .btn-icon { font-size: 13px; flex-shrink: 0; }
  .diff-btn .btn-row .btn-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .diff-btn .btn-sub { font-size: 9px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .diff-btn:hover  { border-color: var(--accent); color: var(--accent); }
  .diff-btn.selected { border-color: var(--accent); color: var(--accent); background: #000; }
  .diff-btn.small  { padding: 5px 6px; font-size: 10px; }

  /* PLAYER SLOT */
  .player-slot {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: clamp(4px, 2vw, 8px);
    display: flex; align-items: center; gap: 8px;
    transition: border-color 0.2s, opacity 0.2s;
    min-height: clamp(32px, 8vw, 40px);
  }
  .player-slot.inactive { opacity: 0.35; }
  .player-slot.active   { border-color: rgba(232,197,71,0.35); }
  .avatar {
    width: clamp(28px, 6vw, 38px); height: clamp(28px, 6vw, 38px); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: clamp(12px, 3vw, 18px);
    flex-shrink: 0;
  }
  .player-input {
    flex: 1; min-width: 0; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: clamp(10px, 2.5vw, 14px); font-weight: 500;
  }
  .player-input::placeholder { color: var(--muted); font-weight: 400; }
  .toggle-btn {
    width: clamp(22px, 5vw, 28px); height: clamp(22px, 5vw, 28px); border-radius: 50%; flex-shrink: 0;
    border: 1.5px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; font-size: clamp(12px, 2.5vw, 16px); display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
  .player-slot.active .toggle-btn { border-color: var(--green); color: var(--green); }

  /* BUTTONS */
  .btn-primary {
    width: 100%; padding: clamp(9px, 2vw, 11px);
    background: var(--accent); color: #0d0d0f;
    border: none; border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(17px, 4vw, 22px); letter-spacing: 2px;
    cursor: pointer; transition: transform 0.12s, background 0.15s;
  }
  .btn-primary:hover  { background: #f0d060; transform: translateY(-1px); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary {
    padding: clamp(8px, 2vw, 10px) clamp(12px, 3vw, 24px);
    background: transparent; color: var(--text);
    border: 1.5px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: clamp(12px, 2.5vw, 14px); font-weight: 500;
    cursor: pointer; transition: border-color 0.15s, background 0.15s; white-space: nowrap;
  }
  .btn-secondary:hover { border-color: var(--muted); background: var(--surface2); }

  /* SECTION LABEL */
  .section-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

  /* PLAYER DIFFICULTY */
  .player-diffs { margin-bottom: 1rem; }

  /* CATEGORIES SELECTOR */
  .cat-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .cat-modal {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: clamp(1rem, 4vw, 2rem);
    max-width: 600px; width: 92%; max-height: 88vh; overflow-y: auto;
  }
  .cat-modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(24px, 6vw, 32px); letter-spacing: 2px; margin-bottom: 0.5rem; }
  .cat-modal p  { color: var(--muted); font-size: 13px; margin-bottom: 1.2rem; }
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.2rem; }
  @media(max-width: 480px) { .cat-grid { grid-template-columns: 1fr; } }
  /* Boutons du modal catégories : wrap sur mobile */
  .cat-modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .cat-modal-actions .btn-secondary { flex: 1 1 120px; text-align: center; }
  .cat-modal-actions .btn-primary   { flex: 1 1 100px; font-size: clamp(14px, 3vw, 16px); }
  .cat-item {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 12px; padding: clamp(10px, 2.5vw, 14px) clamp(10px, 2.5vw, 16px);
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; transition: all 0.15s;
  }
  .cat-item:hover          { border-color: var(--accent); }
  .cat-item.selected       { border-color: var(--accent); background: #000; }
  .cat-item .cat-emoji     { font-size: clamp(18px, 4vw, 24px); }
  .cat-item .cat-info      { flex: 1; min-width: 0; }
  .cat-item .cat-name      { font-weight: 600; font-size: clamp(12px, 2.5vw, 14px); }
  .cat-item .cat-count     { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .cat-item .cat-check     { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
  .cat-item.selected .cat-check { background: var(--accent); border-color: var(--accent); color: #000; }

  /* CATEGORIES BUTTON in setup */
  .cat-setup-btn {
    width: 100%; padding: clamp(10px, 2.5vw, 14px); margin-bottom: 2rem;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: clamp(13px, 3vw, 15px); font-weight: 500;
    cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 8px;
    transition: border-color 0.15s;
  }
  .cat-setup-btn:hover { border-color: var(--accent); }
  .cat-setup-btn .cat-tags { display: flex; gap: 6px; flex-wrap: wrap; min-width: 0; }
  .cat-tag-small {
    font-size: 11px; padding: 3px 10px; border-radius: 99px;
    background: rgba(232,197,71,0.12); color: var(--accent);
    border: 1px solid rgba(232,197,71,0.25); white-space: nowrap;
  }

  /* ── SETTINGS ROW (joueurs + son + questions + catégories + timer) ── */
  .settings-row {
    display: flex; gap: 4px; margin-bottom: 1.5rem;
  }
  .settings-btn {
    flex: 1 1 0; min-width: 0; padding: 4px 2px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1px; transition: border-color 0.15s; line-height: 1.2;
  }
  .settings-btn:hover { border-color: var(--accent); }
  .settings-btn.active { border-color: rgba(232,197,71,0.5); background: #000; }
  .settings-btn-row { display: flex; align-items: center; gap: 2px; justify-content: center; max-width: 100%; }
  .settings-btn-icon { font-size: 11px; line-height: 1; flex-shrink: 0; }
  .settings-btn-label { font-size: clamp(6px, 1.5vw, 9px); letter-spacing: 0.3px; text-transform: uppercase; color: var(--muted); white-space: nowrap; text-align: center; line-height: 1.1; }
  .settings-btn-value { font-size: clamp(8px, 1.8vw, 11px); font-weight: 600; color: var(--accent); white-space: nowrap; text-align: center; }

  /* ── SETTINGS MODALS (shared style) ── */
  .settings-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem;
  }
  .settings-modal {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: clamp(1.2rem, 4vw, 2rem); width: 100%; max-width: 420px;
    max-height: 80vh; overflow-y: auto; animation: fadeIn 0.2s ease;
  }
  .settings-modal h2 {
    font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px;
    margin-bottom: 0.4rem; color: var(--accent);
  }
  .settings-modal p { font-size: 13px; color: var(--muted); margin-bottom: 1.2rem; }
  .settings-option-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-bottom: 1.4rem; }
  .settings-option {
    padding: 12px 6px; border-radius: 12px; border: 1.5px solid var(--border);
    background: var(--surface2); color: var(--text); cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-family: 'DM Sans', sans-serif; transition: all 0.15s; text-align: center;
  }
  .settings-option:hover { border-color: var(--accent); }
  .settings-option.selected { border-color: var(--accent); background: #000; color: var(--accent); }
  .settings-option-val { font-size: 18px; font-weight: 700; }
  .settings-option-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }
  .settings-option.selected .settings-option-sub { color: rgba(232,197,71,0.7); }


  /* ── THÈME VISUEL PAR CATÉGORIE ─────────────────── */
  .theme-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .theme-bg::before {
    content: ''; position: absolute; inset: 0;
  }
  .theme-geo::before { background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(74,144,226,0.35) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 90% 100%, rgba(46,204,113,0.15) 0%, transparent 60%); }
  .theme-histoire::before { background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(139,111,71,0.45) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 10% 100%, rgba(231,76,60,0.15) 0%, transparent 60%); }
  .theme-sciences::before { background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(46,204,113,0.35) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 90% 100%, rgba(52,152,219,0.15) 0%, transparent 60%); }
  .theme-litterature::before { background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(155,89,182,0.40) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 10% 100%, rgba(142,68,173,0.20) 0%, transparent 60%); }
  .theme-cinema::before { background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(231,76,60,0.35) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 90% 100%, rgba(192,57,43,0.20) 0%, transparent 60%); }
  .theme-musique::before { background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(243,156,18,0.40) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 10% 100%, rgba(230,126,34,0.20) 0%, transparent 60%); }
  .theme-culture::before { background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(26,188,156,0.35) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 90% 100%, rgba(22,160,133,0.20) 0%, transparent 60%); }
  .theme-sport::before { background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(76,175,80,0.35) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 90% 100%, rgba(56,142,60,0.20) 0%, transparent 60%); }
  .theme-maths::before { background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,152,0,0.35) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 10% 100%, rgba(245,124,0,0.20) 0%, transparent 60%); }
  .theme-francais::before { background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(52,152,219,0.35) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 90% 100%, rgba(41,128,185,0.20) 0%, transparent 60%); }
  .theme-animaux::before { background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,107,53,0.35) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 90% 100%, rgba(200,80,30,0.20) 0%, transparent 60%); }
  
  /* ── MODE SOMBRE / CLAIR ──────────────────────────── */
  body.light-mode {
    --bg: #7a7468;
  }
  .dark-toggle {
    position: fixed; top: 12px; right: 16px; z-index: 500;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface); border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .dark-toggle:hover { transform: scale(1.1); border-color: var(--accent); }

  /* ── AUDIO MUSIQUE ────────────────────────────────── */
  .audio-player-wrap {
    margin: 10px 0; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 12px;
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  }
  .audio-play-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; transition: transform 0.15s;
  }
  .audio-play-btn:hover { transform: scale(1.08); }
  .audio-progress { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .audio-progress-bar { height: 100%; background: var(--accent); width: 0%; }
  .audio-label { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* ROUND INDICATOR */
  .round-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
  .round-badge { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; padding: 5px 14px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .current-player-tag { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1.5px solid rgba(232,197,71,0.3); border-radius: 10px; padding: 6px clamp(10px, 2vw, 16px); min-width: 0; }
  .cp-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cp-name { font-size: clamp(12px, 2.5vw, 14px); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }

  /* PROGRESS DOTS */
  .progress-dots { display: flex; gap: 5px; justify-content: center; margin-bottom: 1.2rem; flex-wrap: wrap; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--surface2); border: 1.5px solid var(--border); transition: all 0.3s; }
  .dot.done   { background: var(--accent); border-color: var(--accent); }
  .dot.active { background: transparent; border-color: var(--accent); box-shadow: 0 0 8px rgba(232,197,71,0.5); }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: clamp(1rem, 4vw, 2rem); margin-bottom: 1.2rem;
    position: relative;
  }
  .q-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 8px; flex-wrap: wrap; }
  .cat-pill {
    display: inline-block; font-size: clamp(10px, 2vw, 11px); letter-spacing: 1.5px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 99px;
    background: rgba(232,197,71,0.12); color: var(--accent);
    border: 1px solid rgba(232,197,71,0.25);
  }
  .q-img { width:100%; max-height:220px; object-fit:contain; border-radius:10px; margin-bottom:10px; background:rgba(0,0,0,0.08); }
  .q-text { font-size: clamp(15px, 3.5vw, 22px); font-weight: 500; line-height: 1.45; color: var(--text); }

  /* HP / TTS BUTTON */
  .hp-btn {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 7px 12px;
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; transition: all 0.15s; font-size: clamp(11px, 2.5vw, 13px); font-weight: 500;
    color: var(--text); flex-shrink: 0;
  }
  .hp-btn:hover   { border-color: var(--accent2); color: var(--accent2); }
  .hp-btn.speaking { border-color: var(--accent2); color: var(--accent2); background: rgba(240,124,62,0.1); animation: pulse-hp 1s infinite; }
  @keyframes pulse-hp { 0%,100% { box-shadow: 0 0 0 0 rgba(240,124,62,0.4); } 50% { box-shadow: 0 0 0 6px rgba(240,124,62,0); } }
  .hp-icon { font-size: 16px; }

  /* VOICES MODAL */
  .voice-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .voice-modal {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: clamp(1rem, 4vw, 2rem);
    max-width: 500px; width: 92%; max-height: 80vh; overflow-y: auto;
  }
  .voice-modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(22px, 5vw, 28px); letter-spacing: 2px; margin-bottom: 0.5rem; }
  .voice-modal p  { color: var(--muted); font-size: 13px; margin-bottom: 1.5rem; }
  .voice-list     { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
  .voice-item {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: all 0.15s;
  }
  .voice-item:hover    { border-color: var(--accent); }
  .voice-item.selected { border-color: var(--accent); background: #000; }
  .voice-name { font-weight: 600; font-size: 14px; }
  .voice-lang { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* OPTIONS */
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media(max-width: 520px) { .options-grid { grid-template-columns: 1fr; } }
  .opt {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: clamp(10px, 2.5vw, 14px) clamp(12px, 3vw, 18px);
    font-size: clamp(13px, 3vw, 15px); font-weight: 400; color: var(--text);
    cursor: pointer; text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    display: flex; align-items: center; gap: 10px; line-height: 1.4;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: rgba(232,197,71,0.06); transform: translateX(3px); }
  .opt:disabled { cursor: default; }
  .opt.correct { border-color: var(--green); background: rgba(78,202,127,0.12); color: var(--green); }
  .opt.wrong   { border-color: var(--red);   background: rgba(232,84,84,0.1);   color: var(--red); }
  .opt.reveal  { border-color: var(--green); background: rgba(78,202,127,0.07); color: var(--green); opacity: 0.65; }
  .opt-letter {
    width: clamp(24px, 5vw, 28px); height: clamp(24px, 5vw, 28px); border-radius: 8px;
    background: var(--surface); border: 1.5px solid var(--border);
    font-family: 'Bebas Neue', sans-serif; font-size: clamp(13px, 3vw, 16px);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--muted); transition: all 0.15s;
  }
  .opt.correct .opt-letter { background: rgba(78,202,127,0.2); border-color: var(--green); color: var(--green); }
  .opt.wrong   .opt-letter { background: rgba(232,84,84,0.2);  border-color: var(--red);   color: var(--red); }
  .opt.reveal  .opt-letter { border-color: var(--green); color: var(--green); }

  /* FEEDBACK */
  .feedback-bar { border-radius: var(--radius); padding: clamp(10px, 2.5vw, 14px) clamp(12px, 3vw, 18px); font-size: clamp(12px, 2.5vw, 14px); line-height: 1.5; margin-bottom: 1rem; border: 1.5px solid; }
  .feedback-bar.ok { background: rgba(78,202,127,0.1); border-color: rgba(78,202,127,0.3); color: #a8e8c5; }
  .feedback-bar.ko { background: rgba(232,84,84,0.1);  border-color: rgba(232,84,84,0.3);  color: #f5a0a0; }
  .feedback-bar strong { font-weight: 600; }

  /* SCOREBOARD STRIP */
  .scores-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.2rem; }

<div class="bg-decor" id="bg-decor"></div>

<script>
(function() {
  // Icônes par catégorie
  const CAT_ICONS = {
    Geographie: { icons: ['🌍','🗺️','🧭','🏔️','🌊','🏝️','🌐','🗾','🏕️','🌋','🧊','🌿'], color: '#4a90e2' },
    Histoire:   { icons: ['🏛️','⚔️','👑','🗡️','🏺','📜','🎖️','🔱','🪖','⚱️','🏰','🕌'], color: '#c9a45a' },
    Sciences:   { icons: ['🔬','🧬','🧪','⚛️','🔭','🧲','💡','🧫','🌡️','🔋','🧑‍🔬','🪐'], color: '#2ecc71' },
    Litterature:{ icons: ['📚','✍️','🖊️','📖','🪶','🔖','📝','🎭','🖋️','📕','📗','🏆'], color: '#c084fc' },
    Cinema:     { icons: ['🎬','🎥','🎞️','🎦','🏆','🍿','⭐','🎭','📽️','🎪','🎠','🌟'], color: '#f87171' },
    Musique:    { icons: ['🎵','🎸','🎹','🎺','🎻','🥁','🎤','🎼','🎶','🪗','🎷','🪘'], color: '#fbbf24' },
    Culture:    { icons: ['🎨','🖼️','🎪','🎡','🏛️','🗿','🎠','🌐','🎭','🗽','🏟️','🎯'], color: '#34d399' },
    Sport:      { icons: ['⚽','🏀','🎾','🏅','🥇','🏋️','🚴','🏊','🥊','🏈','⚾','🎿'], color: '#4eca7f' },
    Maths:      { icons: ['➕','✖️','🔢','📐','📏','🔣','∑','π','🧮','📊','📈','🔟'], color: '#fb923c' },
    Francais:   { icons: ['🖊️','📝','🗣️','📖','🔤','🇫🇷','✒️','📜','🔡','📓','💬','🗒️'], color: '#60a5fa' },
  };

  // Mélange général pour la page d'accueil
  const allIcons = Object.values(CAT_ICONS).flatMap(c => c.icons.slice(0,4).map(i => ({ icon: i, color: c.color })));
  // Shuffle
  for (let i = allIcons.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allIcons[i], allIcons[j]] = [allIcons[j], allIcons[i]];
  }

  const decor = document.getElementById('bg-decor');

  // Génère 60 icônes disposées en grille pseudo-aléatoire sur tout l'écran
  const cols = 5, rows = 5;
  let idx = 0;
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const item = allIcons[idx % allIcons.length];
      idx++;
      const el = document.createElement('div');
      el.className = 'bg-icon';

      // Position : diviser l'écran en cellules + offset aléatoire
      const topBase  = (row / rows) * 100;
      const leftBase = (col / cols) * 100;
      const topOff   = (Math.random() - 0.5) * (100 / rows * 0.7);
      const leftOff  = (Math.random() - 0.5) * (100 / cols * 0.7);
      el.style.top  = `${topBase + topOff}%`;
      el.style.left = `${leftBase + leftOff}%`;

      // Taille aléatoire
      const size = 42 + Math.random() * 52; // 42–94px
      el.style.fontSize = `${size}px`;

      // Opacité plus élevée
      const opacity = 0.18 + Math.random() * 0.20; // 0.18–0.38
      el.style.opacity = opacity.toFixed(2);

      // Couleur + glow
      el.style.color = item.color;
      el.style.filter = `drop-shadow(0 0 ${8 + Math.random()*14}px ${item.color}88)`;

      // Animation décalée
      const dur   = 10 + Math.random() * 10;
      const delay = -(Math.random() * dur);
      const anim  = Math.random() > 0.5 ? 'floatIcon' : 'floatIconAlt';
      el.style.animationName     = anim;
      el.style.animationDuration = `${dur}s`;
      el.style.animationDelay    = `${delay}s`;
      el.style.animationTimingFunction = 'ease-in-out';
      el.style.animationIterationCount = 'infinite';

      el.textContent = item.icon;
      decor.appendChild(el);
    }
  }

  // Quelques très gros icônes décoratifs en arrière-plan
  const bigIcons = ['🌍','⚔️','🔬','📚','🎬','🎵','⚽','🎨','➕','🖊️'];
  bigIcons.forEach((icon, i) => {
    const el = document.createElement('div');
    el.className = 'bg-icon';
    el.style.fontSize = `${130 + Math.random()*80}px`;
    el.style.top  = `${5 + (i % 3) * 35 + Math.random()*15}%`;
    el.style.left = `${(i / bigIcons.length) * 100 + (Math.random()-0.5)*8}%`;
    el.style.opacity = (0.06 + Math.random()*0.06).toFixed(2);
    el.style.filter = 'blur(2px)';
    el.style.animationDuration = `${18 + Math.random()*10}s`;
    el.style.animationDelay   = `${-Math.random()*20}s`;
    el.textContent = icon;
    decor.appendChild(el);
  });

  // Stocker les icônes par cat pour le changement dynamique à la question
  window._bgCatIcons = CAT_ICONS;
})();
</script>

ude (~460°C) à cause de son effet de serre extrême.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Quel est le numéro atomique de l'oxygène ?", "opts": ["6", "7", "8", "9"], "ans": 2, "niveau": "moyen", "exp": "L'oxygène a 8 protons.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Qui a découvert la pénicilline ?", "opts": ["Pasteur", "Robert Koch", "Alexander Fleming", "Marie Curie"], "ans": 2, "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Penicillin_past_present_future.jpg?width=300", "niveau": "moyen", "exp": "Fleming a découvert la pénicilline en 1928."}, {"q": "Quelle loi de Newton énonce F=ma ?", "opts": ["1ère loi", "2ème loi", "3ème loi", "4ème loi"], "ans": 1, "niveau": "moyen", "exp": "La 2ème loi de Newton est F = m × a.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/GodfreyKneller-IsaacNewton-1689.jpg?width=300"}, {"q": "Qu'est-ce que la mitose ?", "opts": ["Division sexuée", "Division asexuée", "Synthèse de protéines", "Respiration cellulaire"], "ans": 1, "niveau": "moyen", "exp": "La mitose produit deux cellules identiques.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Quel est le pH de l'eau pure ?", "opts": ["5", "6", "7", "8"], "ans": 2, "niveau": "moyen", "exp": "L'eau pure a un pH neutre de 7.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Quelle est la distance Terre-Soleil ?", "opts": ["50 millions km", "150 millions km", "300 millions km", "500 millions km"], "ans": 1, "niveau": "moyen", "exp": "La distance Terre-Soleil est ~150 millions de km (1 UA).", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Qu'est-ce que l'osmose ?", "opts": ["Passage d'ions", "Passage de l'eau à travers une membrane", "Échange de gaz", "Réaction chimique"], "ans": 1, "niv  planète tourne à l'envers par rapport aux autres ?", "opts": ["Mars", "Saturne", "Uranus", "Vénus"], "ans": 3, "niveau": "moyen", "exp": "Vénus tourne en sens rétrograde.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Quel élément donne la couleur verte aux feuilles ?", "opts": ["Carotène", "Chlorophylle", "Anthocyane", "Xanthophylle"], "ans": 1, "niveau": "moyen", "exp": "La chlorophylle réfléchit le vert.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Qu'est-ce que la loi de conservation de l'énergie ?", "opts": ["L'énergie diminue", "L'énergie se crée seul", "L'énergie ne se crée ni ne se détruit", "L'énergie se crée et se détruit"], "ans": 2, "niveau": "moyen", "exp": "L'énergie ne peut être ni créée ni détruite.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Qu'est-ce que le génome ?", "opts": ["L'ensemble des gènes d'un organisme", "Un seul chromosome", "Une protéine", "Un type d'ARN"], "ans": 0, "niveau": "moyen", "exp": "Le génome est l'ensemble complet de l'information génétique.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Quel est le type d'onde du son ?", "opts": ["Transversale", "Électromagnétique", "Longitudinale", "Sismique"], "ans": 2, "niveau": "moyen", "exp": "Le son est une onde longitudinale.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Quel est le nombre d'Avogadro ?", "opts": ["6.022 × 10²³", "3.14159", "2.718", "1.38 × 10⁻²³"], "ans": 0, "niveau": "moyen", "exp": "Le nombre d'Avogadro est 6.022 × 10²³ par mole.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Quelle est la température du Soleil en surface ?", "opts": ["1 000°C", "5 500°C", "15 000°C", "100 000°C"], "ans": 1, "niveau": "moyen", "exp": "La surface du S iki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Quel est le principe d'Archimède ?", "opts": ["Tout corps reçoit une poussée vers le haut égale au poids du fluide déplacé", "La pression augmente avec la profondeur", "Les fluides transmettent la pression", "Les gaz se dilatent avec la chaleur"], "ans": 0, "niveau": "moyen", "exp": "La poussée d'Archimède = poids du fluide déplacé.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Qu'est-ce que la vitesse de libération de la Terre ?", "opts": ["7.9 km/s", "11.2 km/s", "15 km/s", "20 km/s"], "ans": 1, "niveau": "moyen", "exp": "La vitesse de libération terrestre est ~11.2 km/s.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Qu'est-ce que la loi de Coulomb ?", "opts": ["Force entre deux charges", "Force gravitationnelle", "Pression d'un gaz", "Champ magnétique"], "ans": 0, "niveau": "moyen", "exp": "La loi de Coulomb décrit la force électrostatique entre deux charges.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Qu'est-ce que la chromatographie ?", "opts": ["Séparation de molécules selon leur affinité", "Réaction chimique", "Technique de coloration", "Méthode d'analyse spectrale"], "ans": 0, "niveau": "moyen", "exp": "La chromatographie sépare les composés d'un mélange selon leurs propriétés.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Qu'est-ce que la vitesse orbitale de la Terre ?", "opts": ["10 km/s", "30 km/s", "60 km/s", "100 km/s"], "ans": 1, "niveau": "moyen", "exp": "La Terre orbite à environ 30 km/s autour du Soleil.", "img": "https://commons.wikimedia.org/wiki/Special:FilePath/Science_collage.jpg?width=300"}, {"q": "Qu'est-ce que l'électrolyse ?", "opts": ["Combustion", "Décomposition par électricité", "Fusion", "Réaction acide-base"], "ans": 1, "niveau": "moyen", "exp": "L'élect // TTS - Android Native
// ─────────────────────────────────────────────────────────────────────────────
let ttsState = { speaking: false };

function initTTS() {
  // Check if we're on Android with native TTS
  if (typeof AndroidTTS !== 'undefined') {
    return AndroidTTS.isReady();
  }
  return false;
}

function speakQuestion(text) {
  if (!text) return;
  
  // Cancel any previous speech
  stopSpeaking();
  
  // Try native Android TTS first
  if (typeof AndroidTTS !== 'undefined' && AndroidTTS.isReady()) {
    AndroidTTS.speak(text);
    ttsState.speaking = true;
    const btn = document.getElementById('hp-btn');
    if (btn) btn.classList.add('speaking');
    
    // Set callback for when speech finishes
    window.ttsCallback = function(speaking) {
      ttsState.speaking = false;
      const btn = document.getElementById('hp-btn');
      if (btn) btn.classList.remove('speaking');
    };
    return;
  }
  
  // Fallback to Web Speech API
  if (!window.speechSynthesis) return;
  
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'fr-FR';
  utt.rate = 0.9;
  utt.pitch = 1.0;
  utt.volume = 1;
  
  utt.onstart = () => {
    ttsState.speaking = true;
    const btn = document.getElementById('hp-btn');
    if (btn) btn.classList.add('speaking');
  };
  
  utt.onend = utt.onerror = () => {
    ttsState.speaking = false;
    const btn = document.getElementById('hp-btn');
    if (btn) btn.classList.remove('speaking');
  };
  
  window.speechSynthesis.speak(utt);
}

function stopSpeaking() {
  if (typeof AndroidTTS !== 'undefined') {
    AndroidTTS.stop();
  }
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
  }
  ttsState.speaking = false;
  const btn = document.getElementById('hp-btn');
  if (btn) btn.classList.remove('speaking');
}

function toggleSpeak() {
  const q = getCurrentQuestion();
  if (!q) return;
  if (ttsState.speaking) {
    stopSpeaking();
  } else {
    speakQuestion(q.q);
  }
}

let audioCtx = null;
let soundEnabled = true;

function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } 
    catch(e) { console.log('Web Audio API non supportÃÂ©e'); }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, startTime, type='sine', vol=0.2) {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, startTime);
  gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
  osc.start(startTime); osc.stop(startTime + duration);
}

function playNoise(duration, startTime, vol=0.15) {
  if (!soundEnabled || !audioCtx) return;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  noise.buffer = buffer;
  filter.type = 'lowpass'; filter.frequency.value = 800;
  noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(vol, startTime);
  gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
  noise.start(startTime);
}

function playFeedbackSound(type) {
  initAudio();
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  
  if (type === 'ok') {
    // Acclamations : petit arpÃÂ¨ge joyeux + bruit de foule simulÃÂ©
    playTone(523.25, 0.12, t, 'triangle', 0.25);      // Do
    playTone(659.25, 0.12, t + 0.13, 'triangle', 0.25); // Mi  
    playTone(783.99, 0.2, t + 0.26, 'triangle', 0.25);  // Sol
    // Petit bruit de foule
    playNoise(0.4, t + 0.1, 0.08);
  } else {
    // Buzz/error : descente + bruit grave
    playTone(400, 0.15, t, 'sawtooth', 0.25);
    playTone(300, 0.15, t + 0.1, 'sawtooth', 0.25);
    playTone(200, 0.3, t + 0.2, 'sawtooth', 0.25);
    playNoise(0.35, t, 0.12); // bruit de "wah wah"
  }
}

function toggleSound() {

function toggleAudio(videoId) {
  if (_audioPlaying && _ytVideoId === videoId) {
    stopAudio();
  } else {
    playAudio(videoId);
  }
}

function playAudio(videoId) {
  stopAudio();
  _ytVideoId = videoId;
  _audioPlaying = true;
  const btn = document.getElementById('audio-btn');
  if (btn) btn.textContent = '⏸';
  // Charger l'API YouTube si nécessaire
  if (!window.YT) {
    const script = document.createElement('script');
    script.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(script);
    window._ytReadyCallback = () => _createYTPlayer(videoId);
  } else if (window.YT.Player) {
    _createYTPlayer(videoId);
  }
}

window.onYouTubeIframeAPIReady = function() {
  if (window._ytReadyCallback) window._ytReadyCallback();
};

function _createYTPlayer(videoId) {
  const wrap = document.getElementById('yt-player-div');
  if (!wrap) return;
  _ytPlayer = new YT.Player('yt-player-div', {
    height: '1', width: '1',
    videoId: videoId,
    playerVars: { autoplay: 1, controls: 0, start: 30, end: 60 },
    events: {
      onReady: (e) => { e.target.playVideo(); _startProgressBar(30); },
      onStateChange: (e) => { if (e.data === YT.PlayerState.ENDED) stopAudio(); }
    }
  });
}

let _progressInterval = null;
function _startProgressBar(start) {
  clearInterval(_progressInterval);
  let t = 0;
  const duration = 30;
  _progressInterval = setInterval(() => {
    t++;
    const bar = document.getElementById('audio-bar');
    if (bar) bar.style.width = (t / duration * 100) + '%';
    if (t >= duration) { clearInterval(_progressInterval); stopAudio(); }
  }, 1000);
}

function stopAudio() {
  clearInterval(_progressInterval);
  _audioPlaying = false;
  if (_ytPlayer && typeof _ytPlayer.stopVideo === 'function') {
    try { _ytPlayer.stopVideo(); _ytPlayer.destroy(); } catch(e){}
    _ytPlayer = null;
  }
  const btn = document.getElementById('audio-btn');
  if (btn) btn.textContent = '▶';
  const bar = document.getElementById('audio-bar');
  if (bar) bar.style.width = '0%';
  // Recréer le div pour le prochain player
  const wrap = document.getElementById('yt-frame-wrap');
  if (wrap) wrap.innerHTML = '<div id="yt-player-div"></div>';
}

// Build ALL_QUESTIONS from selected categories
// Mélange les réponses d'une question tout en maintenant le bon index de réponse
function shuffleOptions(q) {
  const indexed = q.opts.map((opt, i) => ({ opt, correct: i === q.ans }));
  const shuffled = shuffle(indexed);
  return {
    ...q,
    opts: shuffled.map(x => x.opt),
    ans: shuffled.findIndex(x => x.correct)
  };
}

function buildQuestions() {
  let pool = [];
  if (state.gameMode === 'classic') {
    // Classic mode: use global difficulty — shuffle within each category
    const cats = shuffle([...state.selectedCategories]);
    cats.forEach(cat => {
      const qs = shuffle((QUESTION_DB[cat] || []).filter(q => q.niveau === state.difficulty).map(q => shuffleOptions({ ...q, cat })));
      pool = pool.concat(qs);
    });
  } else {
    // Multi-points mode: include all difficulties — shuffle within each category
    const cats = shuffle([...state.selectedCategories]);
    cats.forEach(cat => {
      const qs = shuffle((QUESTION_DB[cat] || []).map(q => shuffleOptions({ ...q, cat })));
      pool = pool.concat(qs);
    });
  }
  return pool;
}

// Get current question
function getCurrentQuestion() {
  return state.questions[state.currentQuestion];
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function countQuestions(niveau) {
  let total = 0;
  Object.keys(QUESTION_DB).forEach(cat => {
    total += (QUESTION_DB[cat] || []).filter(q => q.niveau === niveau).length;
  });
  return total;
}

function getInitials(name) { return name.trim().split(' ').map(w=>w[0]?.toUpperCase()||'').join('').slice(0,2) || '?'; }
function getTimerMax() {
  return state.timerSeconds === 0 ? 9999 : state.timerSeconds; // 0 = illimitÃÂ©
}

function setGameMode(mode) {
  state.gameMode = mode;
  if (mode === 'multi-points') {
    // Initialize player difficulties when switching to multi-points
    state.players.forEach((p, i) => {
      if (p) {
        state.playerDifficulties[i] = state.playerDifficulties[i] || 'moyen';
      }
    });
  }
  render();
}

function renderSetup() {
  const activePlayers = state.players.filter(Boolean).length;

  const slots = state.players.map((p, i) => {
    if (!p) return '';
    const av = AVATARS[i];
    const initials = getInitials(p.name);
    return `<div class="player-slot active" id="slot-${i}">
      <div class="avatar" style="background:${av.bg};color:${av.color}">${initials}</div>
      <input class="player-input" id="pinput-${i}" type="text" maxlength="16"
        placeholder="Joueur ${i+1}" value="${p.name}"
        oninput="onNameInput(${i},this.value)">
    </div>`;

// ─────────────────────────────────────────────────────────────────────────────
function openNbQuestionsModal() {
  const container = document.getElementById('cat-modal-container');
  const options = [3, 5, 8, 10, 15, 20];
  const items = options.map(n => {

function setNbQuestions(n) {
  state.questionsPerPlayer = n;
  closeSettingsModal(null);
}

function setPlayerCount(n) {
  // Preserve existing names when changing count
  const names = Array(6).fill(null).map((_,i) => state.players[i]?.name || `Joueur ${i+1}`);
  state.players = Array(6).fill(null);
  for (let i = 0; i < n; i++) {
    state.players[i] = { name: names[i] };

  render();
}

// ─────────────────────────────────────────────────────────────────────────────
function openTimerModal() {
  const container = document.getElementById('cat-modal-container');
  const options = [

    { val: 10, label: '10s', sub: 'Express' },
    { val: 15, label: '15s', sub: 'Rapide' },

  const items = options.map(o => {
    const selected = state.timerSeconds === o.val;
    return `<div class="settings-option${selected?' selected':''}" onclick="setTimerFromModal(${o.val})">
      <span class="settings-option-val">${o.label}</span>
      <span class="settings-option-sub">${o.sub}</span>

    </div>
  </div>`;
}

function setTimerFromModal(val) {
  state.timerSeconds = val;
  closeSettingsModal(null);
  render();
}

function closeSettingsModal(e) {
  if (e === null || e.target.classList.contains('settings-modal-overlay')) {
    document.getElementById('cat-modal-container').innerHTML = '';
    render();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// CATEGORY MODAL
// ─────────────────────────────────────────────────────────────────────────────
function openCatModal() {
  const container = document.getElementById('cat-modal-container');
  const cats = Object.keys(CAT_META);
  const items = cats.map(cat => {
    const meta = CAT_META[cat];
    const selected = state.selectedCategories.includes(cat);
    const count = (QUESTION_DB[cat] || []).length;
    return `<div class="cat-item${selected?' selected':''}" onclick="toggleCat('${cat}')">
      <span class="cat-emoji">${meta.emoji}</span>
      <div class="cat-info">
        <div class="cat-name">${cat}</div>
        <div class="cat-count">${count} questions</div>
      </div>
      <div class="cat-check">${selected?'✓':''}</div>
    </div>`;
  }).join('');

  container.innerHTML = `<div class="cat-modal-overlay" onclick="closeCatModal(event)">
    <div class="cat-modal" onclick="event.stopPropagation()">
      <h2>CATÉGORIES</h2>
      <p>Sélectionnez les thèmes qui seront inclus dans le quiz.</p>
      <div class="cat-grid">${items}</div>
      <div class="cat-modal-actions">
        <button class="btn-secondary" onclick="selectAllCats()">Tout sélectionner</button>
        <button class="btn-secondary" onclick="deselectAllCats()">Tout désélectionner</button>
        <button class="btn-primary" onclick="closeCatModal(null)">Valider</button>
      </div>
    </div>
  </div>`;
}

function closeCatModal(e) {
  if (e === null || e.target.classList.contains('cat-modal-overlay')) {
    document.getElementById('cat-modal-container').innerHTML = '';
    render();
  }
}

function toggleCat(cat) {
  if (state.selectedCategories.includes(cat)) {
    if (state.selectedCategories.length <= 1) return; // keep at least 1
    state.selectedCategories = state.selectedCategories.filter(c => c !== cat);
  } else {
    state.selectedCategories = [...state.selectedCategories, cat];
  }
  openCatModal();
}

function selectAllCats() {
  state.selectedCategories = Object.keys(CAT_META);
  openCatModal();
}

function deselectAllCats() {
  // Garde au minimum 1 catégorie sélectionnée
  const cats = Object.keys(CAT_META);
  state.selectedCategories = [cats[0]];
  openCatModal();
}

// ─────────────────────────────────────────────────────────────────────────────
// QUESTION SCREEN
// ─────────────────────────────────────────────────────────────────────────────
function renderQuestion() {
  const activePlayers = state.players.filter(Boolean);
  const p = state.players[state.currentPlayer];
  const av = AVATARS[state.currentPlayer];
  const q = getCurrentQuestion();
  // Appliquer le thème de la catégorie
  if (q && q.cat) applyCategoryTheme(q.cat);
  const timerMax = getTimerMax();
  const timerWarn = state.timer <= 5;
  const letters = ['A','B','C','D'];
  const catMeta = CAT_META[q.cat] || { emoji: '❓', color: 'var(--accent)' };
  const isDaily = state.gameMode === 'daily';

  const maxScore = Math.max(...state.scores);
  const scores_strip = isDaily ? '' : state.players.map((pl,i) => pl ? `
    <div class="score-chip${state.scores[i]===maxScore && state.scores[i]>0?' leader':''}">
      <div class="chip-dot" style="background:${COLORS[i]}"></div>
      <span class="chip-name">${pl.name}</span>
      <span class="chip-score">${state.scores[i]}</span>
    </div>` : '').join('');

  const progress = state.questions.map((_,i) => {
    let cls = 'dot';
    if (i < state.currentQuestion) {
      const wasCorrect = isDaily && state.dailyAnswers && state.dailyAnswers[i];
      cls += wasCorrect ? (state.dailyAnswers[i].correct ? ' done ok-dot' : ' done ko-dot') : ' done';
    }
    else if (i === state.currentQuestion) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  // Bannière défi journalier
  const dailyBanner = isDaily ? `
    <div style="display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,rgba(232,140,40,0.18),rgba(232,197,71,0.10));border:1.5px solid rgba(232,160,40,0.35);border-radius:12px;padding:8px 16px;margin-bottom:1rem;">
      <span style="font-size:18px">🔥</span>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--accent)">DÉFI JOURNALIER</span>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--muted)">${state.currentQuestion+1}<span style="font-size:13px">/${state.questions.length}</span></span>
    </div>` : '';

  return `<div class="screen">
    <div class="top-bar">
      <button class="menu-back-btn" onclick="confirmGoSetup()" title="Retour menu">MENU</button>
      ${isDaily ? `<span style="font-size:13px;color:var(--muted)">Question ${state.currentQuestion+1}/${state.questions.length}</span>` : `
        <div class="current-player-tag">
          <div class="cp-dot" style="background:${COLORS[state.currentPlayer]}"></div>
          <span class="cp-name">${p.name}</span>
        </div>`}

    </div>
    ${dailyBanner}
    <div class="progress-dots">${progress}</div>
    <div style="text-align:center;margin-top:4px;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--muted)">${Math.floor(state.currentQuestion / activePlayers.length) + 1}/${state.questionsPerPlayer || Q_PER_PLAYER}</div>
    ${scores_strip ? `<div class="scores-strip">${scores_strip}</div>` : ''}
    <div class="q-card">
      <div class="q-card-header">
        <div class="cat-pill" style="background:${catMeta.color}18;color:${catMeta.color};border-color:${catMeta.color}44">
          ${catMeta.emoji} ${q.cat}
          ${state.gameMode === 'multi-points' ? `<span class="diff-pill" style="margin-left:8px;padding:2px 8px;background:${q.niveau==='difficile'?'#e74c3c':q.niveau==='moyen'?'#f39c12':'#2ecc71'}22;color:${q.niveau==='difficile'?'#e74c3c':q.niveau==='moyen'?'#f39c12':'#2ecc71'};border-radius:4px;font-size:11px">${q.niveau === 'facile' ? '1 pt' : q.niveau === 'moyen' ? '2 pts' : '3 pts'}</span>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${state.timerSeconds !== 0 ? `<div class="timer-wrap ${timerWarn?'timer-warn':''}" style="padding:4px 10px;font-size:clamp(14px,3.5vw,18px)">⏱ <span class="timer-num" id="timer-display">${state.timer}</span>s</div>` : ''}
          <button class="hp-btn" id="hp-btn" onclick="toggleSpeak()" title="Écouter la question">
            <span class="hp-icon">🔊</span>

      ${q.opts.map((opt,i)=>`
        <button class="opt" data-idx="${i}" onclick="answer(${i})" ${state.answered?'disabled':''}>
          <div class="opt-letter">${letters[i]}</div>
          ${opt}
        </button>`).join('')}
    </div>
    <div id="feedback-zone"></div>
    <div id="next-zone"></div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// RESULTS SCREEN
// ─────────────────────────────────────────────────────────────────────────────
function renderResults() {
  const activePlayers = state.players.filter(Boolean);
  const sorted = activePlayers.map(p => ({
    ...p, realIdx: state.players.indexOf(p),
    score: state.scores[state.players.indexOf(p)],
    correct: state.correct ? state.correct[state.players.indexOf(p)] : 0,
    total: state.questions.length
  })).sort((a,b)=>b.score-a.score);

  const maxScore = sorted[0]?.score || 1;

  const podiumItems = sorted.slice(0,3);
  const podiumOrder = podiumItems.length === 1 ? [podiumItems[0]] :
    podiumItems.length === 2 ? [podiumItems[1], podiumItems[0]] :
    [podiumItems[1], podiumItems[0], podiumItems[2]];
  const podiumRanks = podiumItems.length === 1 ? [1] :
    podiumItems.length === 2 ? [2,1] : [2,1,3];
  const podiumHeights = podiumItems.length === 1 ? [160] :

  const winner = sorted[0];
  const winnerAv = AVATARS[winner.realIdx];

  return `<div class="screen">
    <div style="text-align:center;margin-bottom:1.5rem">

// ── Leaderboard ──────────────────────────────────────────────────────────────
function getLeaderboard() {
  try { return JSON.parse(localStorage.getItem(SCORES_STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveToLeaderboard(players, scores, correct, questions) {
  const lb = getLeaderboard();
  const date = new Date().toLocaleDateString('fr-FR');
  players.forEach((p, i) => {
    if (!p) return;
    lb.push({
      name: p.name,
      score: scores[i] || 0,
      correct: correct[i] || 0,
      total: questions.length,
      date,
      cats: [...new Set(questions.map(q => q.cat))]
    });
  });
  lb.sort((a, b) => b.score - a.score);
  lb.splice(50);
  try { localStorage.setItem(SCORES_STORAGE_KEY, JSON.stringify(lb)); } catch {}
}
function clearLeaderboard() {
  try { localStorage.removeItem(SCORES_STORAGE_KEY); } catch {}
  renderLeaderboardModal();
}

// ── Historique des parties ────────────────────────────────────────────────────
function getGameHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveGameHistory(players, scores, correct, questions) {
  const history = getGameHistory();
  const date = new Date().toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  const catStats = {};
  questions.forEach(q => {
    if (!catStats[q.cat]) catStats[q.cat] = { total: 0 };
    catStats[q.cat].total++;
  });
  const activePlayers = players.filter(Boolean);
  const sorted = [...activePlayers].sort((a,b) => (scores[players.indexOf(b)]||0) - (scores[players.indexOf(a)]||0));
  history.unshift({
    date,
    players: activePlayers.map(p => ({
      name: p.name,
      score: scores[players.indexOf(p)] || 0,
      correct: correct[players.indexOf(p)] || 0
    })),
    totalQ: questions.length,
    catStats,
    winner: sorted[0]?.name || '?'
  });
  history.splice(30);
  try { localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(history)); } catch {}
}
function clearGameHistory() {
  try { localStorage.removeItem(HISTORY_STORAGE_KEY); } catch {}
  renderHistoryModal();
}

function getTodayStr() { return new Date().toISOString().slice(0,10); }

// Graine déterministe basée sur la date pour avoir les mêmes questions le même jour
function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    const j = Math.abs(s) % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDailySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}

function startDailyChallenge() {
  // Construire le pool de toutes catégories, tous niveaux
  let pool = [];
  Object.keys(QUESTION_DB).forEach(cat => {
    (QUESTION_DB[cat] || []).forEach(q => pool.push(shuffleOptions({ ...q, cat })));
  });
  // Mélange déterministe selon le jour
  const seed = getDailySeed();
  pool = seededShuffle(pool, seed);
  state.dailyMode = true;
  state.dailyAnswers = []; // { q, correct, userAns, correctAns }
  state.questions = pool.slice(0, DAILY_Q_COUNT);
  state.scores = Array(6).fill(0);
  state.correct = Array(6).fill(0);
  state.currentQuestion = 0;
  state.currentPlayer = 0;
  // Joueur solo pour le défi journalier
  state.players = Array(6).fill(null);
  state.players[0] = { name: 'Moi' };
  state.difficulty = 'moyen';
  state.gameMode = 'daily';
  state.answered = false;
  state.screen = 'question';
  render();
  startTimer();
}

        </div>

        <div class="week-day-bar-wrap"></div>
        <div class="week-day-score">—</div>

function togglePlayer(idx) {
  if (state.players[idx]) {
    state.players[idx] = null;
  } else {
    state.players[idx] = { name: `Joueur ${idx+1}` };
  }
  render();
}

function onNameInput(idx, val) {
  if (state.players[idx]) {
    state.players[idx].name = val || `Joueur ${idx+1}`;
    const av = document.querySelector(`#slot-${idx} .avatar`);
    if (av) av.textContent = getInitials(state.players[idx].name);
  }
}

function setDiff(d) { state.difficulty = d; render(); }

function setTimer(t) { state.timerSeconds = t; render(); }



function startGame() {
  const activePlayers = state.players.filter(Boolean);
  if (!activePlayers.length) return;
  for (let i=0;i<6;i++) {
    const input = document.getElementById(`pinput-${i}`);
    if (input && state.players[i]) state.players[i].name = input.value || `Joueur ${i+1}`;
  }
  const pool = buildQuestions();
  const totalQ = activePlayers.length * (state.questionsPerPlayer || Q_PER_PLAYER);
  state.questions = shuffle(pool).slice(0, Math.min(totalQ, pool.length));
  state.scores = Array(6).fill(0);
  state.correct = Array(6).fill(0);
  state.currentQuestion = 0;
  state.currentPlayer = 0;
  while (!state.players[state.currentPlayer] && state.currentPlayer < 6) state.currentPlayer++;
  state.screen = 'transition';
  render();
}

function setQuestionDiff(diff) {
  // Store selected difficulty for current player
  state.playerDifficulties[state.currentPlayer] = diff;
  
  // In multi-points mode, select a TRULY random question from chosen difficulty
  // from ALL categories (not just current question index)
  if (state.gameMode === 'multi-points') {
    const pool = state.questions.filter(q => q.niveau === diff);
    if (pool.length > 0) {
      const randomIdx = Math.floor(Math.random() * pool.length);
      state.currentQuestion = randomIdx; // Use random index directly
    }
  }
  
  showQuestion();
}

function showQuestion() {
  state.answered = false;
  state.screen = 'question';
  render();
  startTimer();
}

function startTimer() {
  clearInterval(state.timerInterval);
  state.timer = getTimerMax();
  updateTimerDisplay();
  state.timerInterval = setInterval(() => {
    state.timer--;
    updateTimerDisplay();
    if (state.timer <= 0) {
      clearInterval(state.timerInterval);
      if (!state.answered) timeUp();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  if (el) {
    el.textContent = state.timer;
    const wrap = el.closest('.timer-wrap');
    if (wrap) {
      if (state.timer <= 5) wrap.classList.add('timer-warn');
      else wrap.classList.remove('timer-warn');
    }
  }
}

function timeUp() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  state.answered = true;
  const q = getCurrentQuestion();
  const opts = document.querySelectorAll('.opt');
  opts.forEach(b => b.disabled = true);
  opts[q.ans]?.classList.add('reveal');
  const fb = document.getElementById('feedback-zone');
  if (fb) playFeedbackSound('ko');
    fb.innerHTML = `<div class="feedback-bar ko"><strong>Temps écoulé !</strong> La bonne réponse était : <strong>${q.opts[q.ans]}</strong>. ${q.exp}</div>`;
  if (state.gameMode === 'daily') {
    if (!state.dailyAnswers) state.dailyAnswers = [];
    state.dailyAnswers.push({ q: q.q, correct: false, userAns: null, correctAns: q.opts[q.ans], exp: q.exp, cat: q.cat });
  }
  showNextBtn();
}

function answer(i) {
  if (state.answered) return;
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  stopAudio();
  clearInterval(state.timerInterval);
  state.answered = true;
  const q = getCurrentQuestion();
  const opts = document.querySelectorAll('.opt');
  opts.forEach(b => b.disabled = true);
  opts[q.ans]?.classList.add('correct');
  const fb = document.getElementById('feedback-zone');
  const isCorrect = (i === q.ans);
  if (isCorrect) {
    let pts;
    if (state.gameMode === 'multi-points') {
      pts = q.niveau === 'difficile' ? 3 : q.niveau === 'moyen' ? 2 : 1;
    } else {
      pts = state.difficulty === 'difficile' ? 3 : state.difficulty === 'moyen' ? 2 : 1;
    }
    const bonus = (state.gameMode === 'daily') ? 0 : (state.timer > getTimerMax()*0.6 ? 1 : 0);
    state.scores[state.currentPlayer] += pts + bonus;
    if (state.correct) state.correct[state.currentPlayer]++;
    opts[i]?.classList.add('correct');
    playFeedbackSound('ok');
    fb.innerHTML = `<div class="feedback-bar ok"><strong>${state.gameMode==='daily'?'Bonne réponse !':'+'+( pts+bonus)+' points !'}</strong> ${bonus?'⚡ Bonus rapidité ! ':''}${q.exp}</div>`;
  } else {
    opts[i]?.classList.add('wrong');
    playFeedbackSound('ko');
    fb.innerHTML = `<div class="feedback-bar ko"><strong>Raté !</strong> La bonne réponse était : <strong>${q.opts[q.ans]}</strong>. ${q.exp}</div>`;
  }
  // Enregistrer pour synthèse daily
  if (state.gameMode === 'daily') {
    if (!state.dailyAnswers) state.dailyAnswers = [];
    state.dailyAnswers.push({
      q: q.q,
      correct: isCorrect,
      userAns: q.opts[i],
      correctAns: q.opts[q.ans],
      exp: q.exp,
      cat: q.cat
    });
  }
  showNextBtn();
}

function showNextBtn() {
  const zone = document.getElementById('next-zone');
  if (!zone) return;
  const isLast = state.currentQuestion >= state.questions.length - 1;
  const isDaily = state.gameMode === 'daily';
  const label = isLast
    ? (isDaily ? '🏆 VOIR MON RÉSULTAT DU JOUR' : '🏁 VOIR LES RÉSULTATS')
    : (isDaily ? `QUESTION SUIVANTE (${state.currentQuestion+2}/${state.questions.length}) →` : 'QUESTION SUIVANTE →');
  zone.innerHTML = `<button class="btn-primary" style="margin-top:1rem" onclick="nextTurn()">${label}</button>`;
}

function nextTurn() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  state.currentQuestion++;
  if (state.currentQuestion >= state.questions.length) {
    if (state.gameMode === 'daily') {
      // Sauvegarder le résultat du jour
      const score = (state.dailyAnswers || []).filter(a => a.correct).length;
      saveDailyResult(getTodayStr(), { score, date: getTodayStr() });
      state.screen = 'daily_results';
    } else {
      saveToLeaderboard(state.players, state.scores, state.correct, state.questions);
      saveGameHistory(state.players, state.scores, state.correct, state.questions);
      state.screen = 'results';
      clearCategoryTheme();
    }
    render();
    return;
  }

  // In multi-points mode, go to transition to let each player choose difficulty
  if (state.gameMode === 'multi-points') {
    state.answered = false;
    state.screen = 'transition';
    render();
    return;
  }

  // Daily mode: pas de transition, question suivante directement
  if (state.gameMode === 'daily') {
    state.answered = false;
    state.screen = 'question';
    render();
    startTimer();
    return;
  }

  let next = (state.currentPlayer + 1) % 6;
  let tries = 0;
  while (!state.players[next] && tries < 6) { next = (next+1)%6; tries++; }
  state.currentPlayer = next;
  state.answered = false;
  state.screen = 'transition';
  render();
}

function restartSame() {
  const pool = buildQuestions();
  const activePlayers = state.players.filter(Boolean);
  const totalQ = activePlayers.length * (state.questionsPerPlayer || Q_PER_PLAYER);
  state.questions = shuffle(pool).slice(0, Math.min(totalQ, pool.length));
  state.scores = Array(6).fill(0);
  state.correct = Array(6).fill(0);
  state.currentQuestion = 0;
  state.currentPlayer = 0;
  while (!state.players[state.currentPlayer] && state.currentPlayer < 6) state.currentPlayer++;
  state.screen = 'transition';
  render();
}

function confirmGoSetup() {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.id = 'confirm-quit-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <h3>⚠️ QUITTER ?</h3>
      <p>La partie en cours sera abandonnée.<br>Retourner au menu principal ?</p>
      <div class="confirm-btns">
        <button class="confirm-cancel" id="confirm-cancel-btn">Annuler</button>
        <button class="confirm-ok" id="confirm-ok-btn">Retour au menu</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('confirm-cancel-btn').addEventListener('click', function() {
    overlay.remove();
  });
  document.getElementById('confirm-ok-btn').addEventListener('click', function() {
    overlay.remove();
    goSetup();
  });
}

function goSetup() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  clearInterval(state.timerInterval);
  stopAudio();
  clearCategoryTheme();
  document.getElementById('theme-bg')?.remove();
  state.gameMode = 'classic';
  state.dailyMode = false;
  state.dailyAnswers = [];
  state.players = Array(6).fill(null);
  state.players[0] = { name: 'Joueur 1' };
  state.players[1] = { name: 'Joueur 2' };
  state.scores = Array(6).fill(0);
  state.correct = Array(6).fill(0);
  state.screen = 'setup';
  render();
}

// ─────────────────────────────────────────────────────────────────────────────

state.players[0] = { name: 'Joueur 1' };

</script>

</button>

</div>

<script>
// ── PWA Service Worker ──────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = "\nconst CACHE_NAME = 'quiz-culture-v1';\n\nself.addEventListener('install', event => {\n  event.waitUntil(self.skipWaiting());\n});\n\nself.addEventListener('activate', event => {\n  event.waitUntil(\n    caches.keys().then(keys =>\n      Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))\n    ).then(() => self.clients.claim())\n  );\n});\n\nself.addEventListener('fetch', event => {\n  if (event.request.method !== 'GET') return;\n  if (!event.request.url.startsWith('http')) return;\n  event.respondWith(\n    caches.match(event.request).then(cached => {\n      if (cached) return cached;\n      return fetch(event.request).then(response => {\n        if (response && response.status === 200) {\n          const clone = response.clone();\n          caches.open(CACHE_NAME).then(cache => cache.put(event.request, clone));\n        }\n        return response;\n      }).catch(() => caches.match(event.request));\n    })\n  );\n});\n";
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  window.addEventListener('load', () => {
    navigator.serviceWorker.register(swUrl, {scope: '.'})
      .then(reg => console.log('[PWA] Service Worker inline OK'))
      .catch(err => console.warn('[PWA] SW échec:', err));
  });
}

// ── PWA Install Prompt ──────────────────────────────────────
let pwaPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  pwaPrompt = e;
  document.getElementById('pwa-install-btn').classList.add('visible');
});

function pwaInstall() {
  if (pwaPrompt) {
    pwaPrompt.prompt();
    pwaPrompt.userChoice.then(result => {
      if (result.outcome === 'accepted') {
        document.getElementById('pwa-install-btn').classList.remove('visible');
      }
      pwaPrompt = null;
    });
  }
}

// Masquer le bouton si déjà installée
window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-install-btn').classList.remove('visible');
  console.log('[PWA] Application installée !');
});

// ── iOS Safari : afficher le toast d'instruction ─────────────
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

if (isIOS && !isInStandaloneMode) {
  // Montrer le toast après 3 secondes
  setTimeout(() => {
    const toast = document.getElementById('pwa-toast');
    toast.classList.add('visible');
    // Cacher après 8 secondes
    setTimeout(() => toast.classList.remove('visible'), 8000);
  }, 3000);
}
</script>
